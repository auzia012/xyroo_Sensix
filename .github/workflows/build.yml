name: Build XyrooSensix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create Flutter project
        run: |
          flutter create --org com.xyroo --project-name xyroo_sensix tmp_app
          cp -f lib/main.dart tmp_app/lib/main.dart
          mkdir -p tmp_app/lib/services
          cp -f lib/services/shizuku_service.dart tmp_app/lib/services/
          cd tmp_app
          flutter pub get

      - name: Build APK
        run: |
          cd tmp_app
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: XyrooSensix-APK
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
